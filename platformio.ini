; ============================================================
; WaterMeter - Itron EverBlu Cyble Enhanced → ESP32-C3 Super Mini + CC1101
; Protocole : EverBlu (433.82 MHz · 2-FSK · 2.4 kbps)
; ============================================================

[platformio]
default_envs = watermeter
extra_configs = secrets.ini   ; gitignored — contient [secrets] ota_password

[env:watermeter]
platform  = espressif32
board     = esp32-c3-devkitm-1
framework = arduino

; Vitesse moniteur série
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Partition par défaut (4 MB flash sur C3 Super Mini)
board_build.partitions = default.csv

; Librairies externes
lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson  @ ^7.3

; Flags de compilation
; Sans ARDUINO_USB_CDC_ON_BOOT : Serial = UART0, exposé via le contrôleur
; USB-JTAG/Serial intégré du C3 → visible directement dans le moniteur PlatformIO
build_type = debug

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -I include

; OTA possible via upload_protocol = espota si besoin

; ---- Environnement de calibration fréquence ----------------
; Usage : pio run -e tune --target upload
; Scan 433.75 → 433.90 MHz par pas de 0.05.
; Lorsqu'un compteur répond, la fréquence OK s'affiche dans
; le moniteur série → à reporter dans CC1101_FREQ_MHZ (config.h).
[env:tune]
extends   = env:watermeter
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DTUNE_FREQUENCY
    -I include

; ---- Environnement de test des séquences LED ---------------
; Usage : pio run -e tune_led_test --target upload
; Déroule toutes les séquences LED au démarrage pour validation
; visuelle, puis enchaîne sur le scan normal.
[env:tune_led_test]
extends   = env:tune
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DTUNE_FREQUENCY
    -DTUNE_LED_TEST
    -I include

; ---- Upload OTA (Over-The-Air) ------------------------------
; Le mot de passe est lu depuis secrets.ini → [secrets] ota_password
; Il doit correspondre à OTA_PASSWORD dans include/secrets.h
;
; Upload par hostname mDNS :
;   pio run -e watermeter-ota --target upload
;
; Upload par IP (si mDNS indisponible) :
;   pio run -e watermeter-ota --target upload --upload-port 192.168.x.x

[env:watermeter-ota]
extends         = env:watermeter
upload_protocol = espota
upload_port     = watermeter_esp32.local
upload_flags    = --auth=${secrets.ota_password}

[env:tune-ota]
extends         = env:tune
upload_protocol = espota
upload_port     = watermeter_esp32.local
upload_flags    = --auth=${secrets.ota_password}
